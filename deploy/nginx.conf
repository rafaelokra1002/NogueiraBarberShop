worker_processes  auto;

events {
  worker_connections  1024;
}

http {
  # Path to mime.types inside your Nginx installation
  include       D:/usuario/Desktop/nginx/conf/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  # HTTP server proxying to Node app on 3007
  server {
    listen 80;
    server_name nogueirabarbershop.shop www.nogueirabarbershop.shop;

    location / {
      proxy_pass http://127.0.0.1:3007;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: tune proxy timeouts
    proxy_read_timeout  300;
    proxy_connect_timeout 300;
    proxy_send_timeout  300;

    # Optional: increase upload limit
    client_max_body_size 10m;
  }

  # HTTPS server (disabled until you install valid certificates at the paths below)
  # server {
  #   listen 443 ssl http2;
  #   server_name nogueirabarbershop.shop www.nogueirabarbershop.shop;
  #
  #   ssl_certificate     C:/nginx/certs/fullchain.pem;  # ajuste o caminho
  #   ssl_certificate_key C:/nginx/certs/privkey.pem;    # ajuste o caminho
  #
  #   location / {
  #     proxy_pass http://127.0.0.1:3007;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto $scheme;
  #   }
  #
  #   proxy_read_timeout  300;
  #   proxy_connect_timeout 300;
  #   proxy_send_timeout  300;
  # }
}
